<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Login Complete</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: Arial, sans-serif;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
        }
        .code-box {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 5px;
            word-break: break-all;
            font-size: 14px;
        }
        .btn {
            margin-top: 15px;
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OAuth Login Successful</h1>

    <p>아래 Authorization Code를 복사해서 Postman에 넣으세요.</p>

    <div id="codeBox" class="code-box">
        Loading...
    </div>

    <button class="btn" onclick="copyCode()">Copy Code</button>

</div>

<script>
    function getAuthorizationCode() {
        const params = new URLSearchParams(window.location.search);
        return params.get("code");
    }

    function displayCode() {
        const code = getAuthorizationCode();
        const codeBox = document.getElementById("codeBox");

        if (code) {
            codeBox.innerText = code;
        } else {
            codeBox.innerText = "Authorization Code가 없습니다.";
        }
    }

    function copyCode() {
        const code = getAuthorizationCode();
        if (!code) return;

        navigator.clipboard.writeText(code)
            .then(() => alert("Code 복사 완료!"))
            .catch(() => alert("복사 실패"));
    }

    // ✅ 페이지 로드시 code만 표시 (절대 서버 요청 안함)
    window.onload = displayCode;
</script>

</body>
</html>
